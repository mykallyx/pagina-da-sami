<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jogo da Memória 🎀</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@1,700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #fff0f5 0%, #ffe4ee 50%, #ffd6e8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    h1 { font-size: 1.4rem; font-weight: 800; color: #d63870; margin-bottom: 6px; text-align: center; }
    .subtitle { font-size: 0.82rem; color: #e896b0; margin-bottom: 14px; text-align: center; }

    .stats { display: flex; gap: 16px; margin-bottom: 16px; }
    .stat-box {
      background: rgba(255,255,255,0.85);
      border: 2px solid #ffb6c8;
      border-radius: 16px;
      padding: 8px 18px;
      text-align: center;
    }
    .stat-box .num { font-size: 1.3rem; font-weight: 800; color: #d63870; }
    .stat-box .lbl { font-size: 0.7rem; color: #e896b0; font-weight: 700; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }

    .card { aspect-ratio: 1; perspective: 600px; cursor: pointer; }
    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      border-radius: 14px;
    }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card.matched .card-inner { transform: rotateY(180deg); }
    .card.matched .card-front { border: 3px solid #d63870; box-shadow: 0 0 16px rgba(214,56,112,0.4); }

    .card-back, .card-front {
      position: absolute; inset: 0;
      border-radius: 14px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    .card-back {
      background: linear-gradient(135deg, #f48fb1 0%, #d63870 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(255,105,150,0.25);
    }
    .card-back::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 10px;
    }
    .card-back .s-letter {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 2.4rem;
      color: rgba(255,255,255,0.95);
      text-shadow: 0 2px 8px rgba(180,0,80,0.3);
      user-select: none;
      line-height: 1;
    }

    .card-front {
      transform: rotateY(180deg);
      background: #ffe4ee;
      box-shadow: 0 4px 14px rgba(255,105,150,0.2);
    }
    .card-front img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .win-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(255,182,200,0.65);
      backdrop-filter: blur(8px);
      z-index: 50;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-align: center; padding: 24px;
    }
    .win-overlay.show { display: flex; }
    .win-overlay .emoji { font-size: 4rem; animation: bounce 0.6s infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
    .win-overlay h2 { font-size: 1.6rem; font-weight: 800; color: #d63870; }
    .win-overlay p { font-size: 1rem; color: #e45080; font-weight: 600; max-width: 280px; }

    .win-btn {
      background: linear-gradient(135deg, #d63870, #ff6b9d);
      color: #fff; border: none; border-radius: 50px;
      padding: 14px 36px; font-size: 1rem; font-weight: 800;
      font-family: 'Nunito', sans-serif; cursor: pointer;
      box-shadow: 0 4px 16px rgba(214,56,112,0.35);
      transition: transform 0.15s;
    }
    .win-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
<h1>🎀 Jogo da Memória</h1>
<p class="subtitle">Encontre todos os pares!</p>

<div class="stats">
  <div class="stat-box"><div class="num" id="moves">0</div><div class="lbl">jogadas</div></div>
  <div class="stat-box"><div class="num" id="pairs">0/10</div><div class="lbl">pares</div></div>
</div>

<div class="grid" id="grid"></div>

<div class="win-overlay" id="win">
  <div class="emoji">🎉</div>
  <h2>Você conseguiu! 🎀</h2>
  <p id="win-msg"></p>
  <button class="win-btn" onclick="newGame()">Jogar de novo 💕</button>
</div>

let flipped = [], matched = 0, moves = 0, lock = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function newGame() {
  document.getElementById('win').classList.remove('show');
  flipped = []; matched = 0; moves = 0; lock = false;
  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = '0/10';

  const pairs = shuffle([...PHOTOS, ...PHOTOS]);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  pairs.forEach((src) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.src = src;
    card.innerHTML = '<div class="card-inner"><div class="card-back"><span class="s-letter">S</span></div><div class="card-front"><img src="' + src + '" loading="lazy"/></div></div>';
    card.addEventListener('click', () => flipCard(card));
    grid.appendChild(card);
  });
}

function flipCard(card) {
  if (lock || card.classList.contains('flipped') || card.classList.contains('matched') || flipped.length >= 2) return;
  card.classList.add('flipped');
  flipped.push(card);
  if (flipped.length === 2) { moves++; document.getElementById('moves').textContent = moves; lock = true; checkMatch(); }
}

function checkMatch() {
  const [a, b] = flipped;
  if (a.dataset.src === b.dataset.src) {
    a.classList.add('matched'); b.classList.add('matched');
    a.classList.remove('flipped'); b.classList.remove('flipped');
    matched++;
    document.getElementById('pairs').textContent = matched + '/10';
    flipped = []; lock = false;
    if (matched === 10) setTimeout(showWin, 600);
  } else {
    setTimeout(() => { a.classList.remove('flipped'); b.classList.remove('flipped'); flipped = []; lock = false; }, 1000);
  }
}

function showWin() {
  const msgs = [
    'Você achou todos os pares! Assim como a gente foi feito um pro outro 💕',
    'Memória afiada! Mas o que eu não esqueço é que te amo 🌸',
    moves + ' jogadas! Que tal jogar de novo? 😽',
    'Perfeita em tudo, até no jogo da memória 🎀',
  ];
  document.getElementById('win-msg').textContent = msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById('win').classList.add('show');
}

newGame();
</script>
