<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#f48fb1"/>
  <title>🎀</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
      background: #fff0f5;
      touch-action: manipulation;
    }

    /* ══════════════════════
       TELA DE BLOQUEIO
    ══════════════════════ */
    #lock-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #fff0f5 0%, #ffe4ee 50%, #ffd6e8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      z-index: 100;
      transition: transform 0.7s cubic-bezier(0.77, 0, 0.18, 1), opacity 0.6s ease;
    }

    #lock-screen.unlock {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    .marie-wrap { margin-bottom: 10px; }
    .marie-wrap img {
      width: 180px; height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 8px 24px rgba(255,105,150,0.3));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      border: 2px solid #ffb6c8;
      border-radius: 32px;
      padding: 32px 28px;
      width: 100%; max-width: 340px;
      box-shadow: 0 8px 40px rgba(255,105,150,0.15);
      text-align: center;
    }

    .card h1 { font-size: 1.2rem; font-weight: 700; color: #d63870; margin-bottom: 6px; }
    .card p  { font-size: 0.85rem; color: #e896b0; margin-bottom: 22px; }

    .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
    .dot  { width: 14px; height: 14px; background: #ffb6c8; border-radius: 50%; transition: background 0.2s; }
    .dot.filled { background: #d63870; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .btn {
      background: #fff; border: 2px solid #ffb6c8; border-radius: 50%;
      width: 66px; height: 66px; font-size: 1.4rem; font-weight: 700;
      color: #d63870; cursor: pointer; margin: 0 auto;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(255,105,150,0.1);
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.92); background: #ffe0eb; }
    .btn.del { background: #fff0f5; color: #e896b0; font-size: 1.1rem; }
    .btn.zero { grid-column: 2; }
    .msg { margin-top: 16px; font-size: 0.9rem; font-weight: 700; min-height: 20px; color: #d63870; }

    /* ══════════════════════
       POPUP ERRO
    ══════════════════════ */
    .popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(255,182,200,0.5); backdrop-filter: blur(4px);
      z-index: 200; align-items: center; justify-content: center;
    }
    .popup-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
    .popup-box {
      background: #fff; border: 2.5px solid #ffb6c8; border-radius: 28px;
      padding: 30px 24px; max-width: 300px; width: 90%; text-align: center;
      box-shadow: 0 12px 48px rgba(255,105,150,0.25);
    }
    .popup-box img { width: 130px; height: 130px; object-fit: contain; margin-bottom: 12px; }
    .popup-box p { font-size: 1rem; font-weight: 800; color: #d63870; margin-bottom: 16px; }
    .popup-close {
      background: #ffb6c8; border: none; border-radius: 50px; padding: 9px 24px;
      font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700;
      color: #fff; cursor: pointer;
    }
    .popup-close:active { background: #d63870; }

    /* ══════════════════════
       PHONE SHELL
    ══════════════════════ */
    #phone {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      background: linear-gradient(160deg, #fff0f5 0%, #ffe4ee 100%);
      overflow: hidden;
    }

    /* STATUS BAR */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 20px 4px;
      font-size: 0.75rem; font-weight: 700; color: #d63870;
    }
    .status-time { font-size: 1rem; font-weight: 800; }
    .status-icons { display: flex; gap: 6px; font-size: 0.8rem; }

    /* SCREENS CONTAINER */
    .screens {
      flex: 1; position: relative; overflow: hidden;
    }

    .screen {
      position: absolute; inset: 0;
      overflow-y: auto;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s;
    }

    .screen.hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
    .screen.hidden-left  { transform: translateX(-100%); opacity: 0; pointer-events: none; }

    /* HOME SCREEN */
    #home {
      padding: 20px 16px;
      display: flex; flex-direction: column;
    }

    .banner {
      width: 100%; border-radius: 20px; overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(255,105,150,0.2);
    }
    .banner img {
      width: 100%; height: 180px;
      object-fit: cover; object-position: center top;
      display: block;
    }
    .banner-text {
      background: linear-gradient(135deg, #d63870, #ff6b9d);
      padding: 14px 18px;
      color: #fff;
    }
    .banner-text h2 { font-size: 1.2rem; font-weight: 800; }
    .banner-text p  { font-size: 0.8rem; opacity: 0.9; }

    /* APP GRID */
    .apps-section h3 {
      font-size: 0.75rem; font-weight: 700; color: #e896b0;
      letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 14px; padding-left: 4px;
    }

    .apps-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    }

    .app-icon {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer;
    }
    .app-icon-box {
      width: 60px; height: 60px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 12px rgba(255,105,150,0.2);
      transition: transform 0.15s;
    }
    .app-icon-box:active { transform: scale(0.88); }
    .app-icon span { font-size: 0.68rem; font-weight: 700; color: #d63870; text-align: center; }

    .app-pink   { background: linear-gradient(135deg, #ff6b9d, #ffb6c8); }
    .app-rose   { background: linear-gradient(135deg, #d63870, #f48fb1); }
    .app-white  { background: #fff; border: 2px solid #ffb6c8; }
    .app-blush  { background: linear-gradient(135deg, #ffb6c8, #ffe4ee); }

    /* PHOTOS SCREEN */
    #photos {
      padding: 16px;
    }

    .photos-header {
      font-size: 1.3rem; font-weight: 800; color: #d63870;
      margin-bottom: 16px; padding-left: 4px;
    }

    .photos-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px;
    }

    .photo-thumb {
      aspect-ratio: 1; background: #ffe4ee;
      border-radius: 4px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: #ffb6c8;
      cursor: pointer;
    }
    .photo-thumb img {
      width: 100%; height: 100%; object-fit: cover;
    }

    /* NAV BAR */
    .nav-bar {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-top: 1.5px solid #ffb6c8;
      padding: 10px 24px calc(10px + env(safe-area-inset-bottom));
      display: flex; align-items: center; justify-content: space-between;
    }

    .nav-btn {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: #e896b0; font-size: 0.65rem; font-weight: 700;
      transition: color 0.2s;
      padding: 4px 12px;
    }
    .nav-btn .icon { font-size: 1.4rem; }
    .nav-btn.active { color: #d63870; }

    .nav-home-btn {
      background: linear-gradient(135deg, #d63870, #ff6b9d);
      border: none; border-radius: 50%; width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; cursor: pointer;
      box-shadow: 0 4px 16px rgba(214,56,112,0.35);
      transition: transform 0.15s;
    }
    .nav-home-btn:active { transform: scale(0.9); }
  </style>
</head>
<body>

  <!-- ══ PHONE SHELL ══ -->
  <div id="phone">

    <!-- Status bar -->
    <div class="status-bar">
      <span class="status-time" id="clock">--:--</span>
      <div class="status-icons">
        <span>📶</span><span>🔋</span>
      </div>
    </div>

    <!-- Screens -->
    <div class="screens">

      <!-- HOME -->
      <div class="screen" id="home">
        <div class="banner">
          <img src="https://share.zapia.com/io8zynjljfriu1djrnauch" alt="Marie"/>
          <div class="banner-text">
            <h2>🎀 Oi, minha princesa!</h2>
            <p>bem-vinda ao seu cantinho especial 🌸</p>
          </div>
        </div>

        <div class="apps-section">
          <h3>Apps</h3>
          <div class="apps-grid">
            <div class="app-icon" onclick="openScreen('photos')">
              <div class="app-icon-box app-pink">📸</div>
              <span>Fotos</span>
            </div>
            <div class="app-icon">
              <div class="app-icon-box app-rose">💌</div>
              <span>Carta</span>
            </div>
            <div class="app-icon">
              <div class="app-icon-box app-white">🎵</div>
              <span>Música</span>
            </div>
            <div class="app-icon">
              <div class="app-icon-box app-blush">🌹</div>
              <span>Rosas</span>
            </div>
          </div>
        </div>
      </div>

      <!-- FOTOS -->
      <div class="screen hidden-right" id="photos">
        <div class="photos-header">📸 Fotos</div>
        <div class="photos-grid" id="photos-grid">
          <!-- placeholders -->
          <div class="photo-thumb">🌸</div>
          <div class="photo-thumb">🌹</div>
          <div class="photo-thumb">🦋</div>
          <div class="photo-thumb">💕</div>
          <div class="photo-thumb">🎀</div>
          <div class="photo-thumb">🌸</div>
        </div>
      </div>

    </div><!-- /screens -->

    <!-- Nav bar -->
    <div class="nav-bar">
      <button class="nav-btn" id="btn-back" onclick="goBack()">
        <span class="icon">‹</span>
        <span>Voltar</span>
      </button>
      <button class="nav-home-btn" onclick="openScreen('home')">🏠</button>
      <button class="nav-btn" id="btn-lock" onclick="lockScreen()">
        <span class="icon">🔒</span>
        <span>Bloquear</span>
      </button>
    </div>

  </div><!-- /phone -->

  <!-- ══ TELA DE BLOQUEIO ══ -->
  <div id="lock-screen">
    <div class="marie-wrap">
      <img src="https://media0.giphy.com/media/sqTFOd3WnyOcHMB9Ta/giphy.gif" alt="Marie"/>
    </div>
    <div class="card">
      <h1>🎀 Digite a senha</h1>
      <p>Só você sabe 🌸</p>
      <div class="dots" id="dots">
        <span class="dot" id="d0"></span>
        <span class="dot" id="d1"></span>
        <span class="dot" id="d2"></span>
        <span class="dot" id="d3"></span>
      </div>
      <div class="grid">
        <button class="btn" onclick="press('1')">1</button>
        <button class="btn" onclick="press('2')">2</button>
        <button class="btn" onclick="press('3')">3</button>
        <button class="btn" onclick="press('4')">4</button>
        <button class="btn" onclick="press('5')">5</button>
        <button class="btn" onclick="press('6')">6</button>
        <button class="btn" onclick="press('7')">7</button>
        <button class="btn" onclick="press('8')">8</button>
        <button class="btn" onclick="press('9')">9</button>
        <button class="btn del" onclick="del()">⌫</button>
        <button class="btn zero" onclick="press('0')">0</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- ══ POPUP ERRO ══ -->
  <div class="popup-overlay" id="error-popup">
    <div class="popup-box">
      <img src="https://media0.giphy.com/media/Tc9iG2OomOGE2uS8yJ/giphy.gif" alt="Marie brava"/>
      <p>ei! como você errou isso? 😾</p>
      <button class="popup-close" onclick="closePopup()">tente de novo 🎀</button>
    </div>
  </div>

  <script>
    // ── RELÓGIO ──
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      document.getElementById('clock').textContent = h + ':' + m;
    }
    updateClock(); setInterval(updateClock, 10000);

    // ── SENHA ──
    const SENHA = '2602';
    let input = '';

    function updateDots() {
      for (let i = 0; i < 4; i++)
        document.getElementById('d' + i).className = 'dot' + (i < input.length ? ' filled' : '');
    }

    function press(n) {
      if (input.length >= 4) return;
      input += n; updateDots();
      if (input.length === 4) verify();
    }

    function del() { input = input.slice(0,-1); updateDots(); }

    function verify() {
      if (input === SENHA) {
        document.getElementById('lock-screen').classList.add('unlock');
      } else {
        document.getElementById('error-popup').classList.add('show');
        input = ''; updateDots();
      }
    }

    function closePopup() {
      document.getElementById('error-popup').classList.remove('show');
    }

    function lockScreen() {
      input = ''; updateDots();
      document.getElementById('msg').textContent = '';
      const ls = document.getElementById('lock-screen');
      ls.style.transition = 'none';
      ls.style.transform = 'translateY(0)';
      ls.style.opacity = '1';
      ls.classList.remove('unlock');
      ls.style.pointerEvents = '';
      setTimeout(() => { ls.style.transition = ''; }, 50);
    }

    // ── NAVEGAÇÃO ──
    let history = ['home'];

    function openScreen(id) {
      const current = history[history.length - 1];
      if (current === id) return;
      document.getElementById(current).classList.add('hidden-left');
      const next = document.getElementById(id);
      next.classList.remove('hidden-right', 'hidden-left');
      history.push(id);
    }

    function goBack() {
      if (history.length <= 1) return;
      const current = history.pop();
      document.getElementById(current).classList.add('hidden-right');
      const prev = history[history.length - 1];
      document.getElementById(prev).classList.remove('hidden-left', 'hidden-right');
    }
  </script>

</body>
</html>
